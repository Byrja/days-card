<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Дня - Мотивация и Вдохновение</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
        }

        /* Звёзды на фоне */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 1;
            padding: 20px;
        }

        h1 {
            font-family: 'Marck Script', cursive;
            font-size: 3rem;
            color: #f8e5d0;
            text-shadow: 0 0 20px rgba(255, 215, 150, 0.5);
            text-align: center;
        }

        /* Контейнер карты */
        .card-container {
            perspective: 1500px;
            width: 300px;
            height: 450px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
            border-radius: 15px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(255, 200, 150, 0.2);
            overflow: hidden;
        }

        /* Рубашка карты */
        .card-back {
            background: linear-gradient(135deg, #e8c5e5 0%, #d4a5d9 50%, #c898c5 100%);
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Лицевая сторона */
        .card-front {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #fef9f3 0%, #fdf0e0 50%, #fce8d5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 25px;
            border: 3px solid #d4a574;
        }

        .card-front::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px solid rgba(212, 165, 116, 0.4);
            border-radius: 10px;
            pointer-events: none;
        }

        .sun-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.6)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 200, 100, 0.9)); }
        }

        .wish-text {
            font-size: 1.4rem;
            color: #5a4a3a;
            text-align: center;
            line-height: 1.6;
            font-weight: 600;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4a574, transparent);
            margin: 15px 0;
        }

        .card-footer {
            font-family: 'Marck Script', cursive;
            font-size: 1.2rem;
            color: #8a7a6a;
        }

        /* Кнопка */
        .draw-btn {
            padding: 18px 50px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #5a4a3a;
            background: linear-gradient(145deg, #f8e5d0 0%, #e8c9a8 100%);
            border: 2px solid #d4a574;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .draw-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .draw-btn:hover::before {
            opacity: 1;
            left: 100%;
        }

        .draw-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }

        .draw-btn:active {
            transform: translateY(0);
        }

        .draw-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Инструкция */
        .instruction {
            color: rgba(248, 229, 208, 0.7);
            font-size: 1rem;
            text-align: center;
            max-width: 300px;
        }

        /* Эффект искр при перевороте */
        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkle-fade 0.8s ease-out forwards;
        }

        @keyframes sparkle-fade {
            0% { opacity: 1; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
            100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
        }

        /* Адаптивность */
        @media (max-width: 400px) {
            .card-container {
                width: 260px;
                height: 390px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .wish-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <h1>Карта Дня</h1>

        <div class="card-container" id="cardContainer">
            <div class="card" id="card">
                <div class="card-face card-back">
                    <img src="imgs/card-back.png" alt="Рубашка карты">
                </div>
                <div class="card-face card-front">
                    <span class="sun-icon">&#9728;</span>
                    <p class="wish-text" id="wishText">Твоё послание появится здесь...</p>
                    <div class="divider"></div>
                    <span class="card-footer">Карта Дня</span>
                </div>
            </div>
        </div>

        <button class="draw-btn" id="drawBtn">Взять карту дня</button>

        <p class="instruction">Нажмите на карту или кнопку, чтобы получить своё послание на сегодня</p>
    </div>

    <script>
        // Мотивирующие пожелания
        const wishes = [
            "Сегодня — идеальный день, чтобы начать то, о чём ты давно мечтал. Вселенная на твоей стороне!",
            "Ты сильнее, чем думаешь. Каждое препятствие — это ступенька к твоей мечте.",
            "Доверься своей интуиции сегодня. Она знает путь, даже когда разум сомневается.",
            "Маленькие шаги каждый день создают большие перемены. Продолжай идти!",
            "Ты заслуживаешь всего самого лучшего. Позволь себе принять это.",
            "Сегодня твоя энергия притягивает удачу. Будь открыт к новым возможностям!",
            "Твоя уникальность — это твоя суперсила. Сияй своим светом!",
            "Отпусти страхи — они не твои проводники. Доверься своему сердцу.",
            "Чудеса случаются с теми, кто в них верит. Сегодня твой день чудес!",
            "Каждый рассвет приносит новые возможности. Прими их с благодарностью.",
            "Ты на правильном пути, даже если кажется иначе. Продолжай верить.",
            "Твои мысли создают твою реальность. Выбирай светлые мысли!",
            "Сегодня идеальный день для добрых дел. Они вернутся к тебе многократно.",
            "Не бойся мечтать по-крупному — Вселенная любит смелые желания!",
            "Твоя улыбка сегодня может изменить чей-то мир. Делись радостью!",
            "Прошлое уже не имеет власти над тобой. Твоя сила — в настоящем моменте.",
            "Ты — магнит для хороших событий. Позволь им войти в твою жизнь.",
            "Благодарность открывает двери к изобилию. За что ты благодарен сегодня?",
            "Верь в себя так, как веришь в восход солнца — безусловно и с радостью.",
            "Сегодня ты получишь знак. Будь внимателен к подсказкам Вселенной.",
            "Твоя внутренняя сила неисчерпаема. Черпай из неё уверенность!",
            "Любовь — твой главный компас. Следуй за ней сегодня.",
            "Ты — творец своей судьбы. Какой шедевр ты создашь сегодня?",
            "Отдых — это не слабость, а мудрость. Позаботься о себе.",
            "Твои мечты не случайны — они даны тебе, потому что ты способен их осуществить.",
            "Сегодня откроется новая глава. Встречай её с открытым сердцем!",
            "Ты окружён невидимой поддержкой. Ты никогда не одинок.",
            "Каждый твой шаг имеет значение. Иди уверенно!",
            "Сегодня день исцеления. Отпусти всё, что тебя тяготит.",
            "Твоя аура сияет особенно ярко сегодня. Делись этим светом с миром!",
            "Препятствия — это замаскированные уроки. Принимай их с благодарностью.",
            "Ты достоин любви, успеха и счастья. Не соглашайся на меньшее!",
            "Сегодня удачный день для важных разговоров. Говори от сердца.",
            "Твоя интуиция — твой лучший советник. Прислушайся к ней.",
            "Радость — твоё естественное состояние. Возвращайся к ней почаще.",
            "Сегодня ты можешь всё, во что веришь. Верь в лучшее!"
        ];

        const card = document.getElementById('card');
        const cardContainer = document.getElementById('cardContainer');
        const drawBtn = document.getElementById('drawBtn');
        const wishText = document.getElementById('wishText');
        let isFlipped = false;

        // Создание звёзд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (1.5 + Math.random()) + 's';
                starsContainer.appendChild(star);
            }
        }

        // Создание искр
        function createSparkles() {
            const colors = ['#FFD700', '#FFA500', '#FF69B4', '#87CEEB', '#98FB98'];
            for (let i = 0; i < 20; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerHTML = '&#10022;';
                sparkle.style.left = (Math.random() * 300 + 50) + 'px';
                sparkle.style.top = (Math.random() * 450 + 100) + 'px';
                sparkle.style.color = colors[Math.floor(Math.random() * colors.length)];
                sparkle.style.fontSize = (15 + Math.random() * 20) + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 800);
            }
        }

        // Переворот карты
        function flipCard() {
            if (isFlipped) {
                // Сброс карты
                card.classList.remove('flipped');
                isFlipped = false;
                drawBtn.textContent = 'Взять карту дня';
            } else {
                // Выбор случайного пожелания
                const randomWish = wishes[Math.floor(Math.random() * wishes.length)];
                wishText.textContent = randomWish;

                // Переворот
                card.classList.add('flipped');
                createSparkles();
                isFlipped = true;
                drawBtn.textContent = 'Взять другую карту';
            }
        }

        // События
        cardContainer.addEventListener('click', flipCard);
        drawBtn.addEventListener('click', flipCard);

        // Инициализация
        createStars();
    </script>

      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-hover",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 鼠标离开事件处理
  function handleMouseOut(e) {
    if (!highlightEnabled) return;
    var relatedTarget = e.relatedTarget;

    // 如果鼠标移动到高亮相关元素上，不隐藏高亮
    if (relatedTarget && (relatedTarget === highlightBox || relatedTarget === tagLabel || relatedTarget === overlay || relatedTarget === selectedBox || relatedTarget === selectedLabel)) {
      return;
    }
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    try {
      window.parent.postMessage({
        type: "iframe-element-hover",
        data: null,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 点击事件处理
  function handleClick(e) {
    var target = e.target;
    if (!target || target === overlay || target === highlightBox || target === tagLabel || target === selectedBox || target === selectedLabel) {
      return;
    }

    // 避免处理 html 和 body 元素
    if (target === document.documentElement || target === document.body) {
      return;
    }

    // 检查是否是交互元素，这些元素需要保留默认行为
    var isInteractiveElement = ['input', 'textarea', 'select', 'button', 'a'].includes(target.tagName.toLowerCase());

    // 如果高亮功能启用，对于非交互元素阻止默认行为和事件传播
    if (highlightEnabled) {
      e.preventDefault();
      e.stopPropagation();
    }
    var rect = target.getBoundingClientRect();
    var selector = getElementSelector(target);
    var text = getElementText(target);
    var attributes = getElementAttributes(target);
    console.log("Element clicked:", {
      tagName: target.tagName,
      selector: selector,
      rect: rect
    });

    // 立即更新选中高亮
    updateSelectedHighlight(target);

    // 隐藏悬停高亮，因为现在是选中状态
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    var elementInfo = {
      tagName: target.tagName.toLowerCase(),
      rect: {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
